trigger: none
pr: none

parameters:
- name: mode
  displayName: Pipeline Mode
  type: string
  default: promotion
  values:
  - promotion
- name: environment
  displayName: Target Environment
  type: string
  default: Prod
  values:
  - Prod
- name: controlPlane
  displayName: Control Plane
  type: string
  default: OnCloud
  values:
  - OnCloud
- name: rollbackBuildId
  displayName: Rollback source Run/Build ID
  type: string
  default: 'not-required'
- name: rollbackBackupFile
  displayName: Rollback backup YAML filename
  type: string
  default: 'not-required'

stages:
- stage: Validate_Run_Rules
  displayName: Validate run rules
  jobs:
  - job: ValidateRules
    displayName: Check mode/environment/branch rules
    pool:
      name: cicd-agent
    steps:
    - bash: |
        set -euo pipefail

        MODE="${{ parameters.mode }}"
        ENVIRONMENT="${{ parameters.environment }}"
        BRANCH="$(Build.SourceBranch)"

        if [ "$BRANCH" != "refs/heads/master" ]; then
          echo "Invalid run: prod pipeline must run from refs/heads/master."
          exit 1
        fi

        if [ "$MODE" != "promotion" ]; then
          echo "Invalid run: prod pipeline supports only promotion."
          exit 1
        fi

        if [ "$ENVIRONMENT" != "Prod" ]; then
          echo "Invalid run: prod pipeline supports only Prod."
          exit 1
        fi

        echo "Valid run: promotion on Prod from master branch."
        exit 0
      displayName: Enforce pipeline guardrails

- ${{ if eq(parameters.mode, 'promotion') }}:
  - template: pipelines/promotion.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}
