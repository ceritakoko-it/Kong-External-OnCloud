trigger: none
pr: none

parameters:
- name: mode
  displayName: Pipeline Mode
  type: string
  default: deployment
  values:
  - deployment
  - promotion
  - rollback
- name: environment
  displayName: Target Environment
  type: string
  default: Uat
  values:
  - Uat
  - Prod
- name: controlPlane
  displayName: Control Plane
  type: string
  default: OnCloud
  values:
  - OnCloud
- name: rollbackBuildId
  displayName: Rollback source Run/Build ID
  type: string
  default: 'not-required'
- name: rollbackBackupFile
  displayName: Rollback backup YAML filename
  type: string
  default: 'not-required'

stages:
- stage: Validate_Run_Rules
  displayName: Validate run rules
  jobs:
  - job: ValidateRules
    displayName: Check mode/environment/branch rules
    pool:
      vmImage: ubuntu-latest
    steps:
    - bash: |
        set -euo pipefail

        MODE="${{ parameters.mode }}"
        ENVIRONMENT="${{ parameters.environment }}"
        BRANCH="$(Build.SourceBranch)"

        if [ "$BRANCH" != "refs/heads/master" ]; then
          echo "Invalid run: prod pipeline must run from refs/heads/master."
          exit 1
        fi

        case "$MODE" in
          deployment|promotion|rollback)
            ;;
          *)
            echo "Invalid run: unsupported mode '$MODE' for prod pipeline."
            exit 1
            ;;
        esac

        case "$ENVIRONMENT" in
          Uat|Prod)
            echo "Valid run: ${MODE} on ${ENVIRONMENT} from master branch."
            exit 0
            ;;
          *)
            echo "Invalid run: prod pipeline supports only Uat or Prod."
            exit 1
            ;;
        esac
      displayName: Enforce pipeline guardrails

- ${{ if eq(parameters.mode, 'deployment') }}:
  - template: pipelines/deployment.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}

- ${{ if eq(parameters.mode, 'promotion') }}:
  - template: pipelines/promotion.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}

- ${{ if eq(parameters.mode, 'rollback') }}:
  - template: pipelines/rollback.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}
      rollbackBuildId: ${{ parameters.rollbackBuildId }}
      rollbackBackupFile: ${{ parameters.rollbackBackupFile }}
