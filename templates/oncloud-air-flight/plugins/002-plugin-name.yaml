_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
plugins:
- config:
    add:
      body: []
      headers:
      - x-channel:web-portal
      querystring: []
    append:
      body: []
      headers: []
      querystring: []
    http_method: null
    remove:
      body: []
      headers: []
      querystring: []
    rename:
      body: []
      headers: []
      querystring: []
    replace:
      body: []
      headers: []
      querystring: []
      uri: /v1/flights/search
  enabled: true
  name: request-transformer
  protocols:
  - grpc
  - grpcs
  - http
  - https
  route:
    name: air-flight-search-route
