trigger: none
pr: none

parameters:
- name: mode
  displayName: Pipeline Mode
  type: string
  default: deployment
  values:
  - deployment
  - rollback
- name: environment
  displayName: Target Environment
  type: string
  default: Uat
  values:
  - Uat
- name: controlPlane
  displayName: Control Plane
  type: string
  default: OnCloud
  values:
  - OnCloud
- name: redisMode
  displayName: Redis Mode
  type: string
  default: primary
  values:
  - primary
  - preprod
- name: rollbackBuildId
  displayName: Rollback source Run/Build ID
  type: string
  default: 'not-required'
- name: rollbackBackupFile
  displayName: Rollback backup YAML filename
  type: string
  default: 'not-required'

stages:
- stage: Validate_Run_Rules
  displayName: Validate run rules
  jobs:
  - job: ValidateRules
    displayName: Check mode/environment/branch rules
    pool:
      name: cicd-agent
    steps:
    - bash: |
        set -euo pipefail

        MODE="${{ parameters.mode }}"
        ENVIRONMENT="${{ parameters.environment }}"
        BRANCH="$(Build.SourceBranch)"

        if [ "$ENVIRONMENT" != "Uat" ]; then
          echo "Invalid run: uat pipeline supports only Uat."
          exit 1
        fi

        if [ "$BRANCH" != "refs/heads/master" ]; then
          echo "Invalid run: uat pipeline must run from refs/heads/master."
          exit 1
        fi

        case "$MODE" in
          deployment|rollback)
            echo "Valid run: ${MODE} on Uat from master branch."
            exit 0
            ;;
          *)
            echo "Invalid run: uat pipeline supports only deployment or rollback."
            exit 1
            ;;
        esac
      displayName: Enforce pipeline guardrails

- ${{ if eq(parameters.mode, 'deployment') }}:
  - template: pipelines/deployment.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}
      redisMode: ${{ parameters.redisMode }}

- ${{ if eq(parameters.mode, 'rollback') }}:
  - template: pipelines/rollback.yml
    parameters:
      environment: ${{ parameters.environment }}
      controlPlane: ${{ parameters.controlPlane }}
      rollbackBuildId: ${{ parameters.rollbackBuildId }}
      rollbackBackupFile: ${{ parameters.rollbackBackupFile }}
