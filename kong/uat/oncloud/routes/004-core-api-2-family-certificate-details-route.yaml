_format_version: "3.0"
_konnect:
  control_plane_name: uat-OnCloud
routes:
- hosts:
  - uat-connect.kaotim.my
  - uat-connect.kaotim.cloud
  https_redirect_status_code: 426
  name: core-api-2-family-certificate-details-route
  path_handling: v0
  paths:
  - /core-api-2/family/certificate-details
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
  service:
    name: UAT3-Kaotim
