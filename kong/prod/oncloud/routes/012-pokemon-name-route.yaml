_format_version: "3.0"
_konnect:
  control_plane_name: prod-OnCloud
routes:
- hosts:
  - prod-connect.kaotim.my
  - prod-connect.kaotim.cloud
  https_redirect_status_code: 426
  methods:
  - GET
  name: pokemon-sample-route
  path_handling: v0
  paths:
  - ~/api/pokemon/(.*)$
  plugins:
  - config:
      add:
        body: []
        headers: []
        querystring: []
      append:
        body: []
        headers: []
        querystring: []
      http_method: null
      remove:
        body: []
        headers: []
        querystring: []
      rename:
        body: []
        headers: []
        querystring: []
      replace:
        body: []
        headers: []
        querystring: []
        uri: /api/v2/ability/$(uri_captures[1])
    enabled: true
    name: request-transformer
    protocols:
    - grpc
    - grpcs
    - http
    - https
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: false
  service:
    name: pokemon-service
