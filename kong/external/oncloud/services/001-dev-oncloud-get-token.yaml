_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
services:
- connect_timeout: 60000
  enabled: true
  host: __GET_TOKEN_SERVICE_HOST__
  name: __CONTROL_PLANE_NAME__-Get-Token
  path: /auth/oauth/token
  plugins:
  - config:
      custom_fields_by_lua: {}
      path: /usr/local/kong/logs/transaction.log
      reopen: false
    enabled: true
    name: file-log
    protocols:
    - grpc
    - grpcs
    - http
    - https
  port: 443
  protocol: https
  read_timeout: 60000
  retries: 5
  write_timeout: 60000
