  - config:
      access:
      - |
        kong.service.request.clear_header("Authorization")
        kong.service.request.clear_header("authorization")
      body_filter: []
      certificate: []
      functions: []
      header_filter: []
      log: []
      rewrite: []
      ws_client_frame: []
      ws_close: []
      ws_handshake: []
