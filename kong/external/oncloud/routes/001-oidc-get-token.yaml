_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
routes:
- hosts:
  - __PUBLIC_HOST_PRIMARY__
__OPTIONAL_PUBLIC_HOST_SECONDARY__
  https_redirect_status_code: 426
  methods:
  - POST
  - OPTIONS
  name: OIDC-Get-Token
  path_handling: v0
  paths:
  - /api/token
  preserve_host: false
  protocols:
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
  service:
    name: __CONTROL_PLANE_NAME__-Get-Token
