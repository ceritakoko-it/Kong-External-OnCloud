_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
routes:
- hosts:
  - __PUBLIC_HOST_PRIMARY__
__OPTIONAL_PUBLIC_HOST_SECONDARY__
  https_redirect_status_code: 426
  methods:
  - POST
  name: general-services-v1-motor-decrypt-renewal-link-route
  path_handling: v0
  paths:
  - /general-services/motor/decrypt-renewal-link
  plugins:
  - config:
      access:
      - |-
        kong.service.request.enable_buffering()

        local body, err = kong.request.get_body()
        if body and body ~= "" then
            kong.log.set_serialize_value("request.body", body)
        else
            kong.log.set_serialize_value("request.body", "no request body")
        end
      body_filter: []
      certificate: []
      functions: []
      header_filter: []
      log:
      - |-
        local response_body = kong.service.response.get_body()
        if response_body and response_body ~= "" then
            kong.log.set_serialize_value("response.body", response_body)
        else
            kong.log.set_serialize_value("response.body", "no response body")
        end
      rewrite: []
      ws_client_frame: []
      ws_close: []
      ws_handshake: []
      ws_upstream_frame: []
    enabled: true
    name: pre-function
    protocols:
    - grpc
    - grpcs
    - http
    - https
  - config:
      add:
        body: []
        headers: []
        querystring: []
      append:
        body: []
        headers: []
        querystring: []
      http_method: null
      remove:
        body: []
        headers: []
        querystring: []
      rename:
        body: []
        headers: []
        querystring: []
      replace:
        body: []
        headers: []
        querystring: []
        uri: /kaotim-general-services/api/v1/motor/decrypt-renewal-link
    enabled: true
    name: request-transformer
    protocols:
    - grpc
    - grpcs
    - http
    - https
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: false
  tags:
  - generalServices
  - v1
  service:
    name: Kaotim-Cloud
