_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
routes:
- hosts:
  - __PUBLIC_HOST_PRIMARY__
  - __PUBLIC_HOST_SECONDARY__
  https_redirect_status_code: 426
  methods:
  - GET
  name: core-api-v1-family-certificate-list-route
  path_handling: v0
  paths:
  - /core-api/api/v1/family/certificates
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: false
  tags:
  - core-api
  - v1
  - family
  service:
    name: UAT3-Kaotim
