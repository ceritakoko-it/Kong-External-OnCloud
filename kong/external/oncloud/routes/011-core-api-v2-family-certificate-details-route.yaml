_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
routes:
- hosts:
  - __PUBLIC_HOST_PRIMARY__
__OPTIONAL_PUBLIC_HOST_SECONDARY__
  https_redirect_status_code: 426
  methods:
  - GET
  - OPTIONS
  name: core-api-v2-family-certificate-details-route
  path_handling: v0
  paths:
  - /core-api-2/family/certificate-details
  plugins:
  - config:
      bypass_on_err: false
      cache_control: false
      cache_ttl: 300
      content_type:
      - text/plain
      - application/json
      ignore_uri_case: false
      memory:
        dictionary_name: kong_db_cache
      request_method:
      - GET
      - HEAD
      response_code:
      - 200
      - 301
      - 404
      response_headers:
        X-Cache-Key: true
        X-Cache-Status: true
        age: true
      storage_ttl: null
      strategy: redis
      vary_headers: null
      vary_query_params: null
    enabled: true
    instance_name: CoreApiV2-Family-Certificate-Details-Cache
    name: proxy-cache-advanced
    partials:
    - id: __ACTIVE_REDIS_CACHE_PARTIAL_ID__
      name: __ACTIVE_REDIS_CACHE_PARTIAL_NAME__
      path: config.redis
    protocols:
    - grpc
    - grpcs
    - http
    - https
  - config:
      add:
        body: []
        headers: []
        querystring: []
      append:
        body: []
        headers: []
        querystring: []
      http_method: null
      remove:
        body: []
        headers: []
        querystring: []
      rename:
        body: []
        headers: []
        querystring: []
      replace:
        body: []
        headers: []
        querystring: []
        uri: /core-api/api/v2/family/certificate-details
    enabled: true
    name: request-transformer
    protocols:
    - grpc
    - grpcs
    - http
    - https
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
  tags:
  - coreApi
  - v2
  - family
  service:
    name: Kaotim-Cloud
