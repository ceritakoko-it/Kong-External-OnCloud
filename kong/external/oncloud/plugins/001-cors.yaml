_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
plugins:
- config:
    allow_origin_absent: true
    credentials: false
    exposed_headers: null
    headers: null
    max_age: null
    methods:
    - GET
    - HEAD
    - PUT
    - PATCH
    - POST
    - DELETE
    - OPTIONS
    - TRACE
    - CONNECT
    origins: __CORS_ORIGINS__
    preflight_continue: false
    private_network: false
  enabled: true
  name: cors
  protocols:
  - grpc
  - grpcs
  - http
  - https
