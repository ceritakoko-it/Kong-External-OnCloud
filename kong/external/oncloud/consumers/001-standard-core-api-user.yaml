_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
consumers:
- custom_id: __STANDARD_CORE_API_USER_CUSTOM_ID__
  groups:
  - name: Core_API_Group
  jwt_secrets:
  - algorithm: HS256
    key: core-api-claim
    secret: core-api-value
  plugins:
  - config:
      day: null
      error_code: 429
      error_message: API rate limit exceeded
      fault_tolerant: true
      header_name: null
      hide_client_headers: false
      hour: __STANDARD_CORE_API_RATE_LIMIT_HOUR__
      limit_by: consumer
      minute: __STANDARD_CORE_API_RATE_LIMIT_MINUTE__
      month: null
      path: null
      policy: redis
      redis_server_name: null
      redis_username: null
      second: null
      sync_rate: -1
      year: null
    enabled: true
    name: rate-limiting
    partials:
    - id: __ACTIVE_REDIS_PARTIAL_ID__
      name: __ACTIVE_REDIS_PARTIAL_NAME__
      path: config.redis
    protocols:
    - grpc
    - grpcs
    - http
    - https
  username: standard_core_api_user
