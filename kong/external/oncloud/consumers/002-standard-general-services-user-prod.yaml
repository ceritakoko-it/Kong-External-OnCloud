_format_version: "3.0"
_konnect:
  control_plane_name: __CONTROL_PLANE_NAME__
consumers:
- custom_id: __STANDARD_GENERAL_SERVICES_USER_CUSTOM_ID__
  groups:
  - name: General_Services_Group
  plugins:
  - config:
      disable_penalty: false
      error_code: 429
      hide_client_headers: false
      identifier: consumer
      limit:
      - __STANDARD_GENERAL_SERVICES_RATE_LIMIT_MINUTE__
      - __STANDARD_GENERAL_SERVICES_RATE_LIMIT_HOUR__
      namespace: standard_general_services_user_rate_limit
      retry_after_jitter_max: 0
      strategy: redis
      sync_rate: -1
      window_size:
      - 60
      - 3600
      window_type: fixed
    enabled: true
    name: rate-limiting-advanced
    partials:
    - id: __REDIS_PARTIAL_ID__
      name: __REDIS_PARTIAL_NAME__
      path: config.redis
    protocols:
    - grpc
    - grpcs
    - http
    - https
  username: standard_general_services_user
