_format_version: "3.0"
_konnect:
  control_plane_name: preprod-OnCloud
routes:
- hosts:
  - preprod-connect.kaotim.my
  - preprod-connect.kaotim.cloud
  https_redirect_status_code: 426
  name: general-services-create-cp-id-retry-failed-route
  path_handling: v0
  paths:
  - /general-services/create-cp-id/retry-failed
  plugins:
  - config:
      add:
        body: []
        headers: []
        querystring: []
      append:
        body: []
        headers: []
        querystring: []
      http_method: null
      remove:
        body: []
        headers: []
        querystring: []
      rename:
        body: []
        headers: []
        querystring: []
      replace:
        body: []
        headers: []
        querystring: []
        uri: /kaotim-general-services/api/v1/create-cp-id/retry-failed
    enabled: true
    name: request-transformer
    protocols:
    - grpc
    - grpcs
    - http
    - https
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: true
  service:
    name: UAT3-Kaotim
