_format_version: "3.0"
_konnect:
  control_plane_name: Dev-OnCloud
routes:
- hosts:
  - dev-connect.kaotim.my
  - dev-connect.kaotim.cloud
  https_redirect_status_code: 426
  methods:
  - GET
  name: core-api-v1-motor-certificate-list-route
  path_handling: v0
  paths:
  - /core-api/api/v1/motor/certificates
  preserve_host: false
  protocols:
  - http
  - https
  regex_priority: 0
  request_buffering: true
  response_buffering: true
  strip_path: false
  tags:
  - coreApi
  - v1
  - motor
  service:
    name: UAT3-Kaotim
